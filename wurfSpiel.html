<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monstertreff</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rye&display=swap"
      rel="stylesheet"
    />
  </head>

  <!-- beginn body -->

  <body>
    <div class="site">
      <header class="box">
        <p class="title">Monster!</p>
      </header>

      <p class="box">In <span id="entfernung"></span>m schläft ein Monster!</p>
      <p class="box">Versuche es in drei Würfen zu treffen!</p>
      <script>
        var entfernungZumMonster = Math.random() * 90 + 10;
        entfernungZumMonster = Math.round(entfernungZumMonster);
        console.log(entfernungZumMonster);

        document.getElementById("entfernung").innerHTML = entfernungZumMonster;
      </script>

      <main class="box">
        <!-- eingabefenster -->
        <dialog id="meinePromptBox">
          <form method="dialog" id="meinFormular" autocomplete="off">
            <p>
              Bitte geben Sie die Wurfgeschwindigkeit und den Wurfwinkel ein:
            </p>
            <input
              type="number"
              id="nutzerEingabe"
              placeholder="Geschwindigkeit (max. 100)"
              min="1"
              max="100"
              autocomplete="off"
              required
            />
            <input
              type="number"
              id="nutzerEingabe2"
              placeholder="Winkel (max 89) "
              min="1"
              max="89"
              autocomplete="off"
              required
            />
            <div class="button-gruppe">
              <button type="button" id="btnAbbrechen">Abbrechen</button>
              <button type="submit" value="default" id="btnOk">OK</button>
            </div>
          </form>
        </dialog>
        <button id="oeffnenBtn">Wurf</button>
        <button id="restartBtn" style="display: none">Neustart</button>
        <p id="ausgabeText" class="output"></p>

        <figure>
          <img src="monsters.jpg" alt="a picture of a monsters in a group" />
          <figcaption>
            Illustration:
            <a
              href="https://pixabay.com/de/users/saydung-18713596/"
              target="_blank"
              >Saydaung, Piyapong
            </a>
            | Quelle:
            <a
              href="https://pixabay.com/de/illustrations/doodles-monster-kreaturen-5960094/"
              target="_blank"
              >pixabay</a
            >
          </figcaption>
        </figure>

        <script>
          const restartBtn = document.getElementById("restartBtn");
          const formular = document.getElementById("meinFormular");
          const dialog = document.getElementById("meinePromptBox");
          const oeffnenBtn = document.getElementById("oeffnenBtn");
          const btnAbbrechen = document.getElementById("btnAbbrechen");
          const inputFeld = document.getElementById("nutzerEingabe");
          const inputFeld2 = document.getElementById("nutzerEingabe2");
          const ausgabe = document.getElementById("ausgabeText");
          var v0 = document.getElementById("nutzerEingabe");
          var derWinkel = document.getElementById("nutzerEingabe2");

          let versuche = 3;

          btnAbbrechen.addEventListener("click", () => {
            dialog.close("cancel");
          });

          inputFeld.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              event.preventDefault(); // Verhindert unbeabsichtigtes Verhalten
              // Formular absenden
              formular.querySelector("#btnOk").click();
            }
          });

          inputFeld2.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
              event.preventDefault(); // Verhindert unbeabsichtigtes Verhalten
              // Formular absenden
              formular.querySelector("#btnOk").click();
            }
          });

          // Dialog öffnen
          oeffnenBtn.addEventListener("click", () => {
            dialog.showModal();
          });

          var g = 9.81,
            wurfweite;
          // Eingabe verarbeiten, wenn auf OK geklickt wird
          dialog.addEventListener("close", () => {
            if (dialog.returnValue === "default") {
              versuche--;
              console.log(versuche);
              let v0Num = parseFloat(v0.value);
              let winkelNum = parseFloat(derWinkel.value);

              // Umrechnung in Bogenmaß
              let winkelRad = winkelNum * (Math.PI / 180);

              // Wurfweite berechnen
              let wurfweite = (v0Num * v0Num * Math.sin(2 * winkelRad)) / g;
              wurfweite = Math.round(wurfweite);

              if (wurfweite === entfernungZumMonster) {
                ausgabe.innerHTML = `<b>Treffer! Das Monster ist wach und hat Dich lieb!</b>`;
                oeffnenBtn.disabled = true;
                restartBtn.style.display = "inline-block";
                return;
              }

              ausgabe.innerHTML = `<b>Wurfweite: ${wurfweite} m.</b><br>
                                    Verbleibende Versuche: ${versuche}`;

              if (versuche <= 0) {
                alert("Das Monster schläft weiter!");
                ausgabe.innerHTML += "<br><b>Game Over! :(</b>";

                oeffnenBtn.disabled = true;
                restartBtn.style.display = "inline-block";
              }
            } else {
              ausgabe.textContent = "Die Eingabe wurde abgebrochen.";
            }

            // Felder leeren
            v0.value = "";
            derWinkel.value = "";
          });

          restartBtn.addEventListener("click", () => {
            versuche = 3;

            ausgabe.innerHTML =
              "Neues Spiel gestartet. Du hast wieder 3 Versuche.";

            oeffnenBtn.disabled = false;
            restartBtn.style.display = "none";

            v0.value = "";
            derWinkel.value = "";
          });
        </script>
      </main>
    </div>

    <footer>
      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; Website made by 지기 👽 in 2026
    </footer>
  </body>
</html>
